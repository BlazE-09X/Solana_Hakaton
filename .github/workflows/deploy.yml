name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          cd frontend-react/frontend-react
          npm install
          npm run build
        env:
          VITE_PROGRAM_ID: CJMFFyVCeEUqfouQnaVKpXRwBWFD5rUZH8q8VAuggynf

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend-react/dist
          branch: gh-pages
